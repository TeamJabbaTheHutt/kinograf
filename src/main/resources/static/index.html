<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kinograf</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body id="body">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">KINOGRAF</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <ul class="navbar-nav">
                <li class="nav-item active">
                  <a id="navlink-Home" class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a id="navLink-ViewSchedule" class="nav-link" href="#">View Schedule</a>
                </li>
            </ul>
        </div>
    </nav>
    <main id="main" class="page-content">
        <section class="recommended-section">
            <div class="recommended-header">
                <h2>Recommended Movies</h2>
            </div>
            <div class="movie-cards">
                <div class="card">
                    <img id="moviePoster1" class="card-img-top" src="" alt="Movie poster">
                    <div class="card-body bg-light">
                        <h5 id="movieTitle1" class="card-title"></h5>
                        <small class="text-muted">
                            Duration: <span id="movieDuration1"></span>
                        </small>
                        <br>
                        <small class="text-muted">
                            IMDB: <span id="movieRating1"></span>
                        </small>
                        <br><br>
                        <div>
                            <a class="btn btn-primary text-center">Buy Tickets</a>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <img id="moviePoster2" class="card-img-top" src="" alt="Movie poster">
                    <div class="card-body bg-light">
                        <h5 id="movieTitle2" class="card-title"></h5>
                        <small class="text-muted">
                            Duration: <span id="movieDuration2"></span>
                        </small>
                        <br>
                        <small class="text-muted">
                            IMDB: <span id="movieRating2"></span>
                        </small>
                        <br><br>
                        <div class="mx-auto">
                            <a class="btn btn-primary text-center">Buy Tickets</a>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <img id="moviePoster3" class="card-img-top" src="" alt="Movie poster">
                    <div class="card-body bg-light">
                        <h5 id="movieTitle3" class="card-title"></h5>
                        <small class="text-muted">
                            Duration: <span id="movieDuration3"></span>
                        </small>
                        <br>
                        <small class="text-muted">
                            IMDB: <span id="movieRating3"></span>
                        </small>
                        <br><br>
                        <div class="mx-auto">
                            <a class="btn btn-primary text-center">Buy Tickets</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Kinograf. All rights reserved.</p>
        <ul>
            <li><a href="/privacy">Privacy Policy</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </footer>
    <script type="module" src="js/recommendedMovies.js"></script>
    <script type="module" src="js/app.js"></script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
