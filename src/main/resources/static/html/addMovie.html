<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Movie</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body style="background-image: none; background-color: whitesmoke">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand" href="#">KINOGRAF</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav">
            <li class="nav-item ">
                <a class="nav-link" href="adminHomepage.html">Admin Home </a>
            </li>
            <li class="nav-item active">
                <a class="nav-link" href="#">Add Movie <span class="sr-only">(current)</span></a>
            </li>
        </ul>
    </div>
</nav>
<main class="admin-page-content">
    <label for="movieSearch"></label>
    <input id="movieSearch" type="text" placeholder="Search movie">
    <div id="searchResults"></div>

    <div id="movieDetails" style="border:1px solid #ccc; padding:15px; max-width:500px;">
        <img id="moviePoster" src="" alt="Movie Poster" style="width:100%; max-width:300px;">
        <h2 id="movieTitle"></h2>
        <p><strong>Description:</strong> <span id="movieDescription"></span></p>
        <p><strong>Director:</strong> <span id="movieDirector"></span></p>
        <p><strong>Age rating:</strong> <span id="movieAge"></span></p>
        <p><strong>IMDB score:</strong> <span id="movieRating"></span></p>
    </div>
</main>
<footer>
    <p>&copy; 2026 Kinograf. All rights reserved.</p>
    <ul>
        <li><a href="/privacy">Privacy Policy</a></li>
        <li><a href="/contact">Contact</a></li>
    </ul>
</footer>
<script src="../js/movie.js"></script>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
